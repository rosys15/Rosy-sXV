<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rosy's XV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#A7D8F5;

    overflow:hidden;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Georgia, serif;

}

.container{

    display:flex;

    flex-direction:column;

    align-items:center;

    gap:30px;

    z-index:2;

}

.shoe{

    width:min(240px,45vw);

    cursor:pointer;

    animation:float 3s ease-in-out infinite;

    transition:1s ease;

}

.text{

    color:white;

    letter-spacing:5px;

    font-size:.9rem;

    animation:pulse 2s infinite;

}

.light{

    position:fixed;

    inset:0;

    background:white;

    opacity:0;

    pointer-events:none;

    transition:1.2s ease;

    z-index:10;

}

.sparkle{

    position:absolute;

    width:10px;

    height:10px;

    border-radius:50%;

    background:#f4e6c3;

    opacity:0;

}

.open .shoe{

    transform:
        translateY(-60px)
        scale(1.1);

    filter:
        drop-shadow(0 0 30px white)
        drop-shadow(0 0 60px #f4e6c3);

}

.open .light{

    opacity:1;

}

@keyframes float{

    0%{

        transform:translateY(0);

    }

    50%{

        transform:translateY(-15px);

    }

    100%{

        transform:translateY(0);

    }

}

@keyframes pulse{

    0%,100%{

        opacity:.5;

    }

    50%{

        opacity:1;

    }

}

@keyframes sparkle{

    from{

        transform:
            translate(0,0)
            scale(.3);

        opacity:1;

    }

    to{

        transform:
            translate(var(--x),var(--y))
            scale(1.4);

        opacity:0;

    }

}

</style>

</head>

<body>

<div class="container" id="container">

    <img
    src="assets/images/zapatilla.png"
    class="shoe"
    id="shoe">

    <p class="text">PRESS TO OPEN</p>

</div>

<div class="light" id="light"></div>

<script>

const shoe=document.getElementById("shoe");
const body=document.body;

shoe.addEventListener("click",()=>{

    body.classList.add("open");

    createMagic();

    setTimeout(()=>{

        window.location.href="invitacion.html";

    },1800);

});


function createMagic(){

    for(let i=0;i<80;i++){

        const s=document.createElement("div");

        s.className="sparkle";

        s.style.left="50%";

        s.style.top="45%";

        s.style.setProperty("--x",(Math.random()*700-350)+"px");
        s.style.setProperty("--y",(Math.random()*500-250)+"px");

        s.style.animation=`sparkle ${1+Math.random()}s ease-out forwards`;

        document.body.appendChild(s);

        setTimeout(()=>{

            s.remove();

        },2000);

    }

}

</script>

</body>
</html>
